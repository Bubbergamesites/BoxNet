<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoxNet | Apps</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

    <style>
        :root {
            --cardboard-light: #d9b382;
            --cardboard-mid: #c6a670;
            --cardboard-dark: #a68a5b;
            --ink: #3d2b1f;
            --tape-clear: rgba(255, 255, 255, 0.2);
            --surface-white: #ffffff;
        }

        body {
            font-family: 'Courier Prime', monospace;
            background-color: #b5956a;
            /* Cardboard base */
            background-image: radial-gradient(var(--cardboard-mid) 1px, transparent 1px);
            background-size: 25px 25px;
            min-height: 100vh;
            margin: 0;
            display: flex;
            color: var(--ink);
        }

        /* Sidebar - Vertical Packing Slip */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 80px;
            height: 100vh;
            background: var(--cardboard-mid);
            border-right: 4px double var(--ink);
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            overflow-y: auto;
            z-index: 1000;
        }

        .sidebar-btn {
            background: var(--tape-clear);
            border: 1px solid var(--ink);
            color: var(--ink);
            padding: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Courier Prime', monospace;
        }

        .sidebar-btn:hover:not(.empty) {
            background: var(--surface-white);
            transform: scale(1.1);
        }

        .sidebar-btn.empty {
            opacity: 0.2;
            cursor: default;
            border-style: dashed;
        }

        /* Main Content */
        .main-content {
            margin-left: 80px;
            flex: 1;
            padding: 40px;
        }

        .main-content h1 {
            font-size: 3.5rem;
            text-align: center;
            margin-bottom: 40px;
            text-transform: uppercase;
            border-bottom: 3px dashed var(--ink);
            display: inline-block;
            width: 100%;
        }

        /* Search Box - Cardboard Box Style */
        .search-container {
            position: sticky;
            top: 20px;
            background: var(--cardboard-light);
            padding: 20px;
            z-index: 900;
            border: 2px solid var(--ink);
            margin-bottom: 30px;
            box-shadow: 8px 8px 0px var(--ink);
        }

        #gameSearch {
            width: 100%;
            box-sizing: border-box;
            padding: 15px 25px;
            font-size: 18px;
            font-family: 'Courier Prime', monospace;
            border: 2px solid var(--ink);
            background: var(--surface-white);
            color: #000;
            outline: none;
        }

        .letter-header {
            font-weight: 900;
            font-size: 3rem;
            margin: 40px 0 20px 0;
            background: var(--ink);
            color: var(--cardboard-light);
            padding: 0 20px;
            display: inline-block;
        }

        .buttons-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
        }

        /* App Buttons as Shipping Labels */
        .game-button {
            background: var(--surface-white);
            border: 2px solid var(--ink);
            padding: 15px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            box-shadow: 4px 4px 0px var(--cardboard-dark);
            font-family: 'Courier Prime', monospace;
            color: #000;
        }

        .game-button:hover {
            transform: translate(-2px, -2px);
            box-shadow: 7px 7px 0px var(--ink);
            background: #fdfdfd;
        }

        /* Modal Styling */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(61, 43, 31, 0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            width: 95%;
            height: 90%;
            max-width: 1200px;
            background: #fff;
            border: 4px solid var(--ink);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .modal-header {
            color: #000;
            padding: 15px 25px;
            background: var(--cardboard-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--ink);
        }

        .ctrl-btn {
            background: var(--surface-white);
            border: 2px solid var(--ink);
            padding: 8px 15px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Courier Prime';
        }

        .close-btn {
            background: #ff4747;
            color: white;
        }

        /* Barcode Highlight Section */
        .barcode-label {
            background-color: #ffffff;
            display: inline-block;
            padding: 10px 20px;
            border: 2px solid #000;
            margin: 20px auto;
            text-align: center;
        }

        .barcode {
            font-size: 1.5rem;
            letter-spacing: -2px;
            color: #000;
        }
    </style>
</head>

<body>
    <div class="sidebar" id="sidebar"></div>

    <div class="main-content">
        <h1>BOXNET <span style="font-weight: 400; opacity: 0.6;">Apps</span></h1>

        <div class="search-container">
            <input type="text" id="gameSearch" placeholder="SEARCH CARGO MANIFEST..." onkeyup="filterGames()">
        </div>

        <div id="sections-container"></div>

        <div style="text-align: center; width: 100%; padding: 50px 0;">
            <div class="barcode-label">
                <div class="barcode">|||| | || ||| | ||| | ||</div>
                <div style="font-size: 0.7rem; color: #000; font-weight: bold;">MANIFEST-APPS-404</div>
            </div>
        </div>
    </div>

    <div id="gameModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <span id="modalTitle" style="font-weight:bold;">LOADING...</span>
                <div class="modal-controls">
                    <button onclick="openAboutBlank()" class="ctrl-btn">About:Blank</button>
                    <button onclick="toggleFullscreen()" class="ctrl-btn">Fullscreen</button>
                    <button onclick="closeModal()" class="ctrl-btn close-btn">✕</button>
                </div>
            </div>
            <div style="flex:1;">
                <iframe id="gameFrame" style="width:100%; height:100%; border:none;" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script>
        const files = [
            "amazon.com",
            "canva.com",
            "chatgpt.com",
            "crazygames.com",
            "dailymotion.com",
            "discord.gg",
            "disneyplus.com",
            "dropbox.com",
            "ebay.com",
            "fandom.com",
            "freefy.app",
            "gemini.google.com",
            "github.com",
            "google.com",
            "hulu.com",
            "hbomax.com",
            "icloud.com",
            "luna.amazon.com",
            "netflix.com",
            "spotify.com",
            "paramountplus.com",
            "peacocktv.com",
            "pinterest.com",
            "play.fancade.com", 
            "pluto.tv",
            "quora.com",
            "soundcloud.com", 
            "tv.apple.com",
            "twitch.tv",
            "vimeo.com",
            "wikipedia.org",
            "y8.com", 
            "youtube.com"
        ];

        let activeGameUrl = "";

        function generateAllSections() {
            const allChars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
            const filesByChar = {};
            allChars.forEach(char => filesByChar[char] = []);

            files.forEach(file => {
                const firstChar = file.charAt(0).toUpperCase();
                if (filesByChar[firstChar]) filesByChar[firstChar].push(file);
            });

            const container = document.getElementById('sections-container');
            container.innerHTML = '';

            allChars.forEach(char => {
                if (filesByChar[char].length === 0) return;

                const section = document.createElement('div');
                section.className = 'letter-section';
                section.id = `section-${char}`;

                const header = document.createElement('div');
                header.className = 'letter-header';
                header.textContent = char;
                section.appendChild(header);

                const buttonsContainer = document.createElement('div');
                buttonsContainer.className = 'buttons-container';

                filesByChar[char].forEach(file => {
                    const btn = document.createElement('button');
                    btn.className = 'game-button';
                    btn.textContent = file.toUpperCase();
                    btn.onclick = () => openGame(file);
                    buttonsContainer.appendChild(btn);
                });

                section.appendChild(buttonsContainer);
                container.appendChild(section);
            });
            generateSidebar(allChars, filesByChar);
        }

        function openGame(file) {
            const modal = document.getElementById('gameModal');
            const frame = document.getElementById('gameFrame');
            const title = document.getElementById('modalTitle');
            activeGameUrl = `/Nexus-Proxy/embed#https://${encodeURIComponent(file)}`;
            title.textContent = `APP: ${file.toUpperCase()}`;
            frame.src = activeGameUrl;
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('gameModal').style.display = 'none';
            document.getElementById('gameFrame').src = "about:blank";
        }

        function toggleFullscreen() {
            const frame = document.getElementById('gameFrame');
            if (frame.requestFullscreen) frame.requestFullscreen();
            else if (frame.webkitRequestFullscreen) frame.webkitRequestFullscreen();
        }

        function openAboutBlank() {
            if (!activeGameUrl) return;
            const win = window.open("about:blank", "_blank");
            if (win) {
                win.document.write(`<iframe src="${activeGameUrl}" style="position:fixed; top:0; left:0; bottom:0; right:0; width:100%; height:100%; border:none; margin:0; padding:0; overflow:hidden; z-index:999999;"></iframe>`);
            }
        }

        function filterGames() {
            const filter = document.getElementById('gameSearch').value.toLowerCase();
            const sections = document.getElementsByClassName('letter-section');
            for (let section of sections) {
                const buttons = section.getElementsByClassName('game-button');
                let match = false;
                for (let btn of buttons) {
                    const isVisible = btn.textContent.toLowerCase().includes(filter);
                    btn.style.display = isVisible ? "" : "none";
                    if (isVisible) match = true;
                }
                section.style.display = match ? "" : "none";
            }
        }

        function generateSidebar(allChars, filesByChar) {
            const sidebar = document.getElementById('sidebar');
            sidebar.innerHTML = '';
            allChars.forEach(char => {
                const btn = document.createElement('button');
                btn.className = 'sidebar-btn';
                btn.textContent = char;
                if (filesByChar[char].length === 0) btn.classList.add('empty');
                else btn.onclick = () => document.getElementById(`section-${char}`).scrollIntoView({
                    behavior: 'smooth'
                });
                sidebar.appendChild(btn);
            });
        }

        window.addEventListener('DOMContentLoaded', generateAllSections);
    </script>
</body>

</html>
