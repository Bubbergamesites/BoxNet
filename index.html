<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoxNet | Unblocked</title>
    <style>
        :root {
            --cardboard-light: #d9b382;
            --cardboard-mid: #c6a670;
            --cardboard-dark: #a68a5b;
            --tape-clear: rgba(255, 255, 255, 0.2);
            --ink: #3d2b1f;
        }

        body {
            background-color: #2c2c2c;
            color: var(--ink);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* The Main Box Container */
        .box-container {
            background-color: var(--cardboard-light);
            width: 90%;
            max-width: 800px;
            padding: 40px;
            position: relative;
            box-shadow: 20px 20px 0px var(--cardboard-dark);
            border: 2px solid var(--cardboard-dark);
        }

        /* Cardboard Flap Effect */
        .box-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            height: 100%;
            background: var(--cardboard-dark);
            opacity: 0.5;
        }

        header {
            text-align: center;
            border-bottom: 3px dashed var(--ink);
            margin-bottom: 30px;
            padding-bottom: 10px;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        .tagline {
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* Navigation Grid */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }

        .nav-card {
            background-color: var(--cardboard-mid);
            border: 2px solid var(--ink);
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            text-decoration: none;
            color: var(--ink);
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Packing Tape Aesthetic */
        .nav-card::after {
            content: "";
            position: absolute;
            top: -5px;
            width: 40%;
            height: 20px;
            background: var(--tape-clear);
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .nav-card:hover {
            transform: translateY(-5px);
            background-color: var(--cardboard-light);
        }

        .icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .barcode {
            font-size: 1.5rem;
            letter-spacing: -2px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="box-container">
        <header>
            <h1>BoxNet</h1>
            <p class="tagline">FRAGILE: HANDLE WITH ENTERTAINMENT</p>
        </header>

        <main class="nav-grid">
            <a href="/games" class="nav-card">
                <div class="icon">🕹️</div>
                <span>GAMES</span>
            </a>

            <a href="/proxy" class="nav-card">
                <div class="icon">🌐</div>
                <span>WEB PROXY</span>
            </a>

            <a href="/apps" class="nav-card">
                <div class="icon">📱</div>
                <span>APPS</span>
            </a>

            <a href="/ai" class="nav-card">
                <div class="icon">🤖</div>
                <span>AI CHAT</span>
            </a>
        </main>

        <footer>
            <div class="barcode-label">
                <div class="barcode"></div>
            </div>
            <p>EST. 2024 | SHIPMENT #834-UN8L0CK3D</p>
        </footer>
    </div>

</body>

</html>
