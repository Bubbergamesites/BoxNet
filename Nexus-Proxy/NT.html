<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BoxNet | New Tab</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --cardboard: #d9b382;
      --cardboard-dark: #a68a5b;
      --ink: #3d2b1f;
      --paper: #f2e6d5;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Courier Prime', monospace;
      background: #b5956a;
      background-image: radial-gradient(var(--cardboard-dark) 1px, transparent 1px);
      background-size: 30px 30px;
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* The Main Shipping Container */
    .hub-container {
      background: var(--cardboard);
      border: 3px solid var(--ink);
      padding: 50px;
      width: 100%;
      max-width: 800px;
      box-shadow: 15px 15px 0px var(--ink);
      text-align: center;
      position: relative;
    }

    .hub-container::after {
      content: "FRAGILE";
      position: absolute;
      top: 10px;
      right: 15px;
      font-weight: bold;
      border: 2px solid var(--ink);
      padding: 5px;
      transform: rotate(5deg);
      opacity: 0.5;
    }

    .clock {
      font-size: 5rem;
      font-weight: 700;
      letter-spacing: -3px;
    }

    .date {
      font-size: 1rem;
      margin-bottom: 30px;
      text-transform: uppercase;
      opacity: 0.8;
    }

    /* Tracking Search Bar */
    .search-box {
      display: flex;
      background: #fff;
      border: 3px solid var(--ink);
      padding: 10px 20px;
      margin-bottom: 40px;
      box-shadow: 5px 5px 0px var(--ink);
    }

    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      font-family: 'Courier Prime', monospace;
      font-size: 1.2rem;
      background: transparent;
    }

    .search-box i { font-size: 1.2rem; cursor: pointer; padding: 5px; }

    /* Shortcut Grid */
    .shortcuts {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 15px;
      width: 100%;
    }

    .shortcut {
      background: var(--paper);
      border: 2px solid var(--ink);
      padding: 15px 5px;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .shortcut:hover {
      transform: translateY(-5px);
      background: #fff;
      box-shadow: 5px 5px 0px var(--cardboard-dark);
    }
    .shortcut-icon img {
      width: 22px;
      height: 22px;
    }

    .shortcut-icon i {
      font-size: 20px;
      color: #a68a5b;
    }

    .shortcut-icon { font-size: 1.5rem; }
    .shortcut-label { font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }

    .add-btn {
      border: 2px dashed var(--ink);
      background: transparent;
      opacity: 0.6;
    }

    /* Barcode Sticker */
    .barcode-sticker {
      background: white;
      padding: 10px 20px;
      border: 2px solid black;
      display: inline-block;
      margin-top: 40px;
    }

    .barcode-text {
      font-size: 1.5rem;
      letter-spacing: -1px;
      color: black;
    }

    .quote {
      margin-top: 20px;
      font-style: italic;
      font-size: 0.9rem;
      min-height: 1.2rem;
    }
  </style>
</head>
<body>

  <div class="hub-container">
    <div class="clock" id="clock">00:00</div>
    <div class="date" id="date">MANIFST PENDING...</div>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="SEARCH CARGO...">
      <i class="fa-solid fa-magnifying-glass" onclick="doSearch()"></i>
    </div>

    <div class="shortcuts" id="shortcutGrid">
      <a class="shortcut" data-url="https://youtube.com">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/youtube.svg">
      </div>
      <span class="shortcut-label">YouTube</span>
    </a>
    <a class="shortcut" data-url="https://github.com">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/github.svg">
      </div>
      <span class="shortcut-label">GitHub</span>
    </a>
    <a class="shortcut" data-url="https://discord.com">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/discord.svg">
      </div>
      <span class="shortcut-label">Discord</span>
    </a>
    <a class="shortcut" data-url="https://reddit.com">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/reddit.svg">
      </div>
      <span class="shortcut-label">Reddit</span>
    </a>
    <a class="shortcut" data-url="https://spotify.com">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/spotify.svg">
      </div>
      <span class="shortcut-label">Spotify</span>
    </a>
    <a class="shortcut" data-url="https://netflix.com">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/netflix.svg">
      </div>
      <span class="shortcut-label">Netflix</span>
    </a>
    <div class="shortcut" id="addShortcut">
      <div class="shortcut-icon"><i class="fa-solid fa-plus"></i></div>
      <span class="shortcut-label">Add</span>
    </div>
    </div>


    <div class="barcode-sticker">
      <div class="barcode-text">|| | ||| | || || | || |</div>
      <div style="font-size: 0.6rem; color: black; font-weight: bold; font-family: sans-serif;">BOXNET-MANIFEST-0833</div>
    </div>
  </div>

  <script>
    const $ = q => document.querySelector(q);

    // Clock Logic
    function updateClock() {
      const now = new Date();
      $('#clock').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
      $('#date').textContent = now.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Search Logic
    function doSearch() {
      const q = $('#searchInput').value;
      if (q) window.location.href = `https://www.google.com/search?q=${encodeURIComponent(q)}`;
    }
    $('#searchInput').onkeypress = e => { if (e.key === 'Enter') doSearch(); };

    // Shortcut Logic from NT (1).html
    function addShortcut() {
      let name = prompt("Label Name:");
      if (name) {
        let url = prompt("URL:");
        if (!url) return;
        if (!url.startsWith('http')) url = 'https://' + url;

        const shortcuts = JSON.parse(localStorage.getItem('shortcuts') || '[]');
        shortcuts.push({ name, url });
        localStorage.setItem('shortcuts', JSON.stringify(shortcuts));
        renderCustom();
      }
    }

    function renderCustom() {
      document.querySelectorAll('.custom-shortcut').forEach(e => e.remove());
      const shortcuts = JSON.parse(localStorage.getItem('shortcuts') || '[]');
      const addBtn = $('#addShortcut');

      shortcuts.forEach(s => {
        const div = document.createElement('div');
        div.className = 'shortcut custom-shortcut';
        div.onclick = () => window.location.href = s.url;
        div.innerHTML = `
          <div class="shortcut-icon"><i class="fa-solid fa-link"></i></div>
          <span class="shortcut-label">${s.name}</span>
        `;
        addBtn.before(div);
      });
    }

    // Quotes from NT (1).html
    const quotes = [
     "Doin the stuff since 2026",
     "geaggle"
    ];

    function newQuote() {
      $('#quote').textContent = `"${quotes[Math.floor(Math.random() * quotes.length)]}"`;
    }

    // Initialize
    window.onload = () => {
      renderCustom();
      newQuote();
    };

    // Shortcut Redirect Logic
    document.addEventListener('click', e => {
      const s = e.target.closest('.shortcut');
      if (s && s.dataset.url) window.location.href = s.dataset.url;
    });
  </script>
</body>
</html>
