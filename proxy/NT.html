<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>New Tab</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
  <style>
 :root {
      --cardboard: #d9b382;
      --cardboard-dark: #a68a5b;
      --ink: #3d2b1f;
      --paper: #f2e6d5;
      --accent: #2d5a88;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Courier Prime', monospace;
      background: var(--cardboard-dark);
      background-image: radial-gradient(var(--ink) 1px, transparent 1px);
      background-size: 30px 30px;
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* Main Container - Shipping Box Hub */
    .hub-box {
      background: var(--cardboard);
      border: 3px solid var(--ink);
      padding: 50px;
      width: 100%;
      max-width: 850px;
      box-shadow: 15px 15px 0px var(--ink);
      text-align: center;
      position: relative;
    }

    /* "Fragile" Stamp Effect */
    .hub-box::before {
      content: "FRAGILE";
      position: absolute;
      top: 20px;
      left: 20px;
      font-weight: bold;
      border: 2px solid var(--ink);
      padding: 5px 10px;
      transform: rotate(-10deg);
      opacity: 0.4;
    }

    .clock {
      font-size: 5rem;
      font-weight: 700;
      letter-spacing: -2px;
      margin-bottom: 5px;
    }

    .date {
      font-size: 14px;
      text-transform: uppercase;
      margin-bottom: 40px;
      letter-spacing: 2px;
      border-bottom: 1px dashed var(--ink);
      display: inline-block;
      padding-bottom: 5px;
    }

    /* Tracking Number Search Bar */
    .search-box {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      border: 3px solid var(--ink);
      padding: 12px 20px;
      margin-bottom: 40px;
      box-shadow: 5px 5px 0px var(--ink);
    }

    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      font-family: 'Courier Prime', monospace;
      font-size: 1.2rem;
      background: transparent;
      color: #000;
    }

    .search-box i {
      color: var(--ink);
      cursor: pointer;
    }

    /* Shortcut Grid - Parcel Labels */
    .shortcuts {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 20px;
      width: 100%;
    }

    .shortcut {
      background: var(--paper);
      border: 2px solid var(--ink);
      padding: 20px 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      position: relative;
    }

    /* Tape Effect */
    .shortcut::after {
        content: "";
        position: absolute;
        top: -8px; width: 40%; height: 16px;
        background: rgba(255,255,255,0.3);
        border: 1px solid rgba(255,255,255,0.5);
    }

    .shortcut:hover {
      transform: translateY(-5px);
      box-shadow: 6px 6px 0px var(--ink);
      background: #fff;
    }

    .shortcut-icon {
      font-size: 24px;
      color: var(--ink);
    }

    .shortcut-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      word-break: break-all;
      
    }
    
    .shortcut-icon img {
      width: 22px;
      height: 22px;
      color: #2d5a88;
    }

    .shortcut-icon i {
      font-size: 20px;
      color: #3d2b1f;
    }


    #addShortcut {
      border: 2px dashed var(--ink);
      background: transparent;
      opacity: 0.7;
    }

    #addShortcut:hover {
        opacity: 1;
        background: var(--paper);
    }

    /* Quote Section */
    .quote {
      margin-top: 30px;
      font-size: 14px;
      font-style: italic;
      color: var(--ink);
    }

    /* THE BARCODE STICKER */
    .barcode-sticker {
      background: #fff;
      padding: 10px 20px;
      border: 2px solid #000;
      display: inline-block;
      margin-top: 40px;
      text-align: center;
    }

    .barcode-text {
      font-size: 1.5rem;
      letter-spacing: -1px;
      color: #000;
      font-weight: normal;
    }
    .loader {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .loader.show {
      display: flex;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid #1f1f1f;
      border-top-color: #ffff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="hub-box">
  <div class="loader" id="loader">
    <div class="spinner"></div>
  </div>

  <div class="clock" id="clock">00:00</div>
  <div class="date" id="date"></div>

  <form class="search-box" id="searchForm">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input type="text" id="searchInput" placeholder="Search the web..." autocomplete="off">
    <select id="engine">
      <option value="https://search.brave.com/search?q=">Brave</option>
      <option value="https://duckduckgo.com/?q=">DuckDuckGo</option>
      <option value="https://www.google.com/search?q=">Google</option>
    </select>
  </form>

  <div class="shortcuts" id="shortcuts">
    <a class="shortcut" data-url="https://youtube.com">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/youtube.svg">
      </div>
      <span class="shortcut-label">YouTube</span>
    </a>
    <a class="shortcut" data-url="https://github.com">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/github.svg">
      </div>
      <span class="shortcut-label">GitHub</span>
    </a>
    <a class="shortcut" data-url="https://discord.com">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/discord.svg">
      </div>
      <span class="shortcut-label">Discord</span>
    </a>
    <a class="shortcut" data-url="https://twitter.com">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/x.svg"></div>
      <span class="shortcut-label">Twitter</span>
    </a>
    <a class="shortcut" data-url="https://reddit.com">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/reddit.svg">
      </div>
      <span class="shortcut-label">Reddit</span>
    </a>
    <a class="shortcut" data-url="https://spotify.com">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/spotify.svg">
      </div>
      <span class="shortcut-label">Spotify</span>
    </a>
    <a class="shortcut" data-url="https://netflix.com">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/netflix.svg">
      </div>
      <span class="shortcut-label">Netflix</span>
    </a>
    <a class="shortcut" data-url="https://twitch.tv">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/twitch.svg">
      </div>
      <span class="shortcut-label">Twitch</span>
    </a>
    <a class="shortcut" data-url="https://mail.google.com">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/gmail.svg"></div>
      <span class="shortcut-label">Gmail</span>
    </a>
    <div class="shortcut" id="addShortcut">
      <div class="shortcut-icon"><i class="fa-solid fa-plus"></i></div>
      <span class="shortcut-label">Add</span>
    </div>
  </div>

  <div class="quote" id="quote"></div>
</div>
  <script>
    const $ = s => document.querySelector(s);
    const nav = url => {
      $('#loader').classList.add('show');
      window.parent?.postMessage({ type: 'navigate', url }, '*');
    };

    // Clock
    function updateClock() {
      const now = new Date();
      $('#clock').textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
      $('#date').textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    }
    updateClock();
    setInterval(updateClock, 1000);

    // Search
    $('#searchForm').onsubmit = e => {
      e.preventDefault();
      const q = $('#searchInput').value.trim();
      if (q) nav($('#engine').value + encodeURIComponent(q));
    };

    // Shortcuts
    $('#shortcuts').onclick = e => {
      const shortcut = e.target.closest('.shortcut[data-url]');
      const addBtn = e.target.closest('#addShortcut');

      if (shortcut) {
        e.preventDefault();
        nav(shortcut.dataset.url);
      } else if (addBtn) {
        const name = prompt("Shortcut name:");
        if (!name) return;
        let url = prompt("URL:");
        if (!url) return;
        if (!url.startsWith('http')) url = 'https://' + url;

        const shortcuts = JSON.parse(localStorage.getItem('shortcuts') || '[]');
        shortcuts.push({ name, url });
        localStorage.setItem('shortcuts', JSON.stringify(shortcuts));
        renderCustom();
      }
    };

    function renderCustom() {
      document.querySelectorAll('.custom-shortcut').forEach(e => e.remove());
      const shortcuts = JSON.parse(localStorage.getItem('shortcuts') || '[]');
      const addBtn = $('#addShortcut');

      shortcuts.forEach(s => {
        const div = document.createElement('div');
        div.className = 'shortcut custom-shortcut';
        div.dataset.url = s.url;
        div.innerHTML = `
          <div class="shortcut-icon"><i class="fa-solid fa-link"></i></div>
          <span class="shortcut-label">${s.name}</span>
        `;
        addBtn.before(div);
      });
    }

    // Quote
    const quotes = [
];
    $('#quote').textContent = quotes[Math.floor(Math.random() * quotes.length)];

    renderCustom();
  </script>
</body>

</html>
