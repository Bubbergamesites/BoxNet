<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>BoxNet | New Tab</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --cardboard: #d9b382;
      --cardboard-dark: #a68a5b;
      --ink: #3d2b1f;
      --paper: #f2e6d5;
      --tape: rgba(255, 255, 255, 0.2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Courier Prime', monospace;
      background: var(--cardboard-dark);
      /* Subtle texture to look like recycled fiber */
      background-image: radial-gradient(var(--ink) 0.5px, transparent 0.5px);
      background-size: 20px 20px;
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* Main Container styled like the top of a box */
    .container {
      background: var(--cardboard);
      border: 3px solid var(--ink);
      padding: 60px 40px;
      width: 100%;
      max-width: 800px;
      box-shadow: 15px 15px 0px var(--ink);
      text-align: center;
      position: relative;
    }

    /* Cardboard Seam */
    .container::after {
        content: "";
        position: absolute;
        top: 0; left: 50%;
        width: 2px; height: 100%;
        background: var(--ink);
        opacity: 0.1;
    }

    .clock {
      font-size: 5rem;
      font-weight: 700;
      letter-spacing: -3px;
      margin-bottom: 5px;
      color: var(--ink);
    }

    .date {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 40px;
      opacity: 0.8;
    }

    /* Search Bar styled as a Packing Slip input */
    .search-box {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      border: 3px solid var(--ink);
      padding: 15px 25px;
      margin-bottom: 50px;
      box-shadow: 5px 5px 0px var(--ink);
    }

    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      font-family: 'Courier Prime', monospace;
      font-size: 1.2rem;
      background: transparent;
      color: #000;
    }

    .search-box i {
      color: var(--ink);
      font-size: 1.2rem;
    }

    /* Shortcuts styled as Labels */
    .shortcuts {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 20px;
      width: 100%;
    }

    .shortcut {
      background: var(--paper);
      border: 2px solid var(--ink);
      padding: 20px 10px;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      position: relative;
    }

    /* Packing Tape Effect */
    .shortcut::before {
        content: "";
        position: absolute;
        top: -10px; width: 50%; height: 20px;
        background: var(--tape);
        border: 1px solid rgba(255,255,255,0.4);
        backdrop-filter: blur(1px);
    }

    .shortcut:hover {
      transform: translateY(-5px) scale(1.05);
      background: #fff;
      box-shadow: 5px 5px 0px var(--ink);
    }

    .shortcut-icon {
      font-size: 1.5rem;
      color: var(--ink);
    }

    .shortcut-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      width: 100%;
    }

    #addShortcut {
      background: transparent;
      border: 2px dashed var(--ink);
      opacity: 0.6;
    }

    #addShortcut:hover {
        opacity: 1;
        background: var(--paper);
    }

    /* Barcode Branding */
    .barcode-label {
        background: #fff;
        display: inline-block;
        padding: 10px 20px;
        border: 2px solid #000;
        margin-top: 40px;
    }

    .barcode-bars {
        font-size: 1.5rem;
        letter-spacing: -1px;
        color: #000;
        line-height: 1;
    }

    #quote {
      margin-top: 25px;
      font-size: 0.9rem;
      font-style: italic;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="clock" id="clock">00:00</div>
    <div class="date" id="date"></div>

    <div class="search-box">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" id="searchInput" placeholder="TRACKING QUERY...">
    </div>

    <div class="shortcuts" id="shortcutGrid">
      <a class="shortcut" onclick="location.href='https://youtube.com'">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/youtube.svg">
      </div>
      <span class="shortcut-label">YouTube</span>
    </a>
    <a class="shortcut" onclick="location.href='"https://github.com'">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/github.svg">
      </div>
      <span class="shortcut-label">GitHub</span>
    </a>
    <a class="shortcut" onclick="location.href='"https://discord.com'">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/discord.svg">
      </div>
      <span class="shortcut-label">Discord</span>
    </a>
    <a class="shortcut" onclick="location.href='"https://twitter.com'">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/x.svg"></div>
      <span class="shortcut-label">Twitter</span>
    </a>
    <a class="shortcut" onclick="location.href='"https://reddit.com'">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/reddit.svg">
      </div>
      <span class="shortcut-label">Reddit</span>
    </a>
    <a class="shortcut" onclick="location.href='"https://spotify.com'">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/spotify.svg">
      </div>
      <span class="shortcut-label">Spotify</span>
    </a>
    <a class="shortcut" onclick="location.href='"https://netflix.com'">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/netflix.svg">
      </div>
      <span class="shortcut-label">Netflix</span>
    </a>
    <a class="shortcut" onclick="location.href='"https://twitch.tv'">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/twitch.svg">
      </div>
      <span class="shortcut-label">Twitch</span>
    </a>
    <a class="shortcut" onclick="location.href='"https://mail.google.com'">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/gmail.svg"></div>
      <span class="shortcut-label">Gmail</span>
    </a>
    <div class="shortcut" id="addShortcut">
      <div class="shortcut-icon"><i class="fa-solid fa-plus"></i></div>
      <span class="shortcut-label">Add</span>
    </div>
    </div>

    <p id="quote"></p>

    <div class="barcode-label">
        <div class="barcode-bars">|| ||| | ||| | || || |</div>
        <div style="font-size: 10px; font-weight: bold; margin-top: 5px;">MANIFEST-BN-2024</div>
    </div>
  </div>

  <script>
    const $ = q => document.querySelector(q);

    // ALL ORIGINAL JAVASCRIPT RETAINED
    function updateClock() {
      const now = new Date();
      $('#clock').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
      $('#date').textContent = now.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
    }
    setInterval(updateClock, 1000);
    updateClock();

    function doSearch() {
      const q = $('#searchInput').value;
      if (q) window.location.href = `https://www.google.com/search?q=${encodeURIComponent(q)}`;
    }

    $('#searchInput').onkeypress = e => { if (e.key === 'Enter') doSearch(); };

    $('#shortcutGrid').onclick = e => {
      const shortcut = e.target.closest('.shortcut[data-url]');
      const addBtn = e.target.closest('#addShortcut');

      if (shortcut) {
        window.location.href = shortcut.dataset.url;
      } else if (addBtn) {
        let name = prompt("Shortcut Label Name:");
        if (name) {
          let url = prompt("Destination URL:");
          if (!url) return;
          if (!url.startsWith('http')) url = 'https://' + url;

          const shortcuts = JSON.parse(localStorage.getItem('shortcuts') || '[]');
          shortcuts.push({ name, url });
          localStorage.setItem('shortcuts', JSON.stringify(shortcuts));
          renderCustom();
        }
      }
    };

    function renderCustom() {
      document.querySelectorAll('.custom-shortcut').forEach(e => e.remove());
      const shortcuts = JSON.parse(localStorage.getItem('shortcuts') || '[]');
      const addBtn = $('#addShortcut');

      shortcuts.forEach(s => {
        const div = document.createElement('div');
        div.className = 'shortcut custom-shortcut';
        div.dataset.url = s.url;
        div.innerHTML = `
          <div class="shortcut-icon"><i class="fa-solid fa-link"></i></div>
          <span class="shortcut-label">${s.name}</span>
        `;
        addBtn.before(div);
      });
    }

    // ORIGINAL QUOTES
    const quotes = [
        "so tuff",
        "it is what it is",
        "do ur work",
        "this is what happens when u dont touch grass",
        "FULL BOX",
        "FULL PIECE",
        "200!",
        "press esc + refresh + power button for hacks",
        "press ctrl+x to hide your screen",
        "change the tab title and favicon in settings",
        "TEACHERR!",
        "lebron lebron lebronn james",
        "lebron is OUR goat"
    ];

    function newQuote() {
      $('#quote').textContent = `"${quotes[Math.floor(Math.random() * quotes.length)]}"`;
    }

    window.onload = () => {
      renderCustom();
      newQuote();
    };
  </script>
</body>
</html>
